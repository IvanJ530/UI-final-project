<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Identifying Cognitive Distortions{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <style>
    /* ── Design Tokens ────────────────────────────────────────────────────────
       4-color palette: base · accent · dark-grey · light-grey · white
       All other UI states (correct/wrong) are derived from these 4 + white.
    ──────────────────────────────────────────────────────────────────────── */
    :root {
      /* Core 4-color palette */
      --base:        #2C3E7A;   /* deep navy  — primary brand, nav, headings, CTAs */
      --accent:      #5578A8;   /* mid blue   — interactive highlights, borders, progress */
      --dark-grey:   #3D3D4E;   /* near-black — body text (replaces #1a1a2e for contrast) */
      --light-grey:  #E4EAF4;   /* blue-grey  — dividers, inactive borders, subtle fills */
      --white:       #FFFFFF;   /* white      — card surfaces, button text */

      /* Semantic aliases (derived, not new colors) */
      --bg:          #F2F5FB;   /* page bg — tinted white, very close to light-grey */
      --muted-text:  #505570;   /* dark-grey tinted — passes 4.5:1 on --bg */
      --correct:     #1E6B3C;   /* green — correct state; kept as semantic, not palette */
      --wrong:       #9B2D23;   /* red   — wrong state */

      /* ── Base-8 spacing scale ─────────────────────────────────────────── */
      --s1:  0.5rem;   /*  8px */
      --s2:  1rem;     /* 16px */
      --s3:  1.5rem;   /* 24px */
      --s4:  2rem;     /* 32px */
      --s5:  2.5rem;   /* 40px */
      --s6:  3rem;     /* 48px */

      /* ── Type scale — exactly 5 sizes ────────────────────────────────── */
      --text-xs:   0.75rem;   /* 12px — captions, section-headings (ALL CAPS) */
      --text-sm:   0.875rem;  /* 14px — secondary body, sidebar items, muted */
      --text-base: 1rem;      /* 16px — primary body copy */
      --text-lg:   1.25rem;   /* 20px — card sub-headings */
      --text-xl:   1.875rem;  /* 30px — page / lesson title */

      /* ── Line height ──────────────────────────────────────────────────── */
      --lh-body:   1.6;   /* body text ≈ 1.5–1.6 */
      --lh-tight:  1.2;   /* headings */

      /* ── Content max-width for readable line length (≤75 ch) ─────────── */
      --content-max: 680px;
    }

    /* ── Reset / Base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--dark-grey);
      font-family: Georgia, 'Times New Roman', serif;
      font-size: var(--text-base);
      line-height: var(--lh-body);
      margin: 0;
    }

    /* ── Navigation ───────────────────────────────────────────────────────── */
    nav.top-nav {
      background: var(--base);
      padding: 0 var(--s4);
      height: 48px;           /* multiple of 8 */
      display: flex;
      align-items: center;
      gap: 0;
    }
    nav.top-nav .brand {
      color: var(--white);
      font-weight: 700;
      font-size: var(--text-sm);
      margin-right: auto;
      letter-spacing: .03em;
    }
    nav.top-nav a {
      color: rgba(255,255,255,0.65);
      text-decoration: none;
      font-size: var(--text-sm);
      padding: var(--s1) var(--s2);
      border-radius: 4px;
      transition: background .15s, color .15s;
    }
    nav.top-nav a:hover,
    nav.top-nav a.active {
      color: var(--white);
      background: rgba(255,255,255,0.15);
    }

    /* ── Progress bar ─────────────────────────────────────────────────────── */
    .progress-bar-custom {
      height: 4px;              /* 4 = ½ × 8 */
      background: var(--light-grey);
    }
    .progress-bar-custom .fill {
      height: 100%;
      background: var(--accent);
      transition: width .4s;
    }

    /* ── Page wrapper — consistent 24px side padding grid ────────────────── */
    .page-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--s4) var(--s3);  /* 32px top, 24px sides */
    }

    /* ── Card ─────────────────────────────────────────────────────────────── */
    .card-main {
      background: var(--white);
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(44,62,122,.08);
      padding: var(--s4);       /* 32px — multiple of 8 */
      /* Constrain card body to readable line length */
    }
    /* Inner content width cap — keeps body text 45–75 chars */
    .card-main .content-body {
      max-width: var(--content-max);
    }

    /* ── Label pill ───────────────────────────────────────────────────────── */
    .label-pill {
      display: inline-block;
      background: var(--base);
      color: var(--white);
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: .25rem var(--s1);    /* 4px 8px */
      border-radius: 20px;
      margin-bottom: var(--s2);
      line-height: 1.4;
    }

    /* ── Section heading ──────────────────────────────────────────────────── */
    /* Uses ALL CAPS + letter-spacing + xs size — no box needed */
    .section-heading {
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted-text);
      margin-bottom: var(--s1);   /* 8px */
      margin-top: 0;
    }

    /* ── Lesson / page headings ───────────────────────────────────────────── */
    .page-title {
      font-size: var(--text-xl);
      font-weight: 800;
      color: var(--base);
      line-height: var(--lh-tight);
      margin-bottom: var(--s2);
    }
    .card-subtitle {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--base);
      line-height: var(--lh-tight);
      margin-bottom: var(--s2);
    }

    /* ── Body text ────────────────────────────────────────────────────────── */
    .body-text {
      font-size: var(--text-base);
      line-height: var(--lh-body);
      color: var(--dark-grey);
    }
    .muted-text {
      font-size: var(--text-sm);
      color: var(--muted-text);
      line-height: var(--lh-body);
    }

    /* ── Thought bubble ───────────────────────────────────────────────────── */
    /* Gestalt: common region (background tint) groups the scenario.
       Border-left gives it weight WITHOUT depending on color alone —
       the italic + indentation also signal it in greyscale. */
    .thought-bubble {
      background: var(--light-grey);
      border-left: 4px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: var(--s2) var(--s3);    /* 16px 24px */
      font-style: italic;
      font-size: var(--text-base);
      line-height: var(--lh-body);
      color: var(--dark-grey);
      margin: var(--s2) 0;
    }

    /* ── Content zones — reframe & takeaway ───────────────────────────────── */
    /* Gestalt: proximity + left-rule visually groups without full box.
       In greyscale, weight label + indented text still shows structure. */
    .reframe-block {
      border-left: 4px solid var(--correct);
      padding: var(--s2) var(--s3);
      border-radius: 0 8px 8px 0;
      background: #EAF5EE;
      font-size: var(--text-base);
      line-height: var(--lh-body);
      margin: var(--s2) 0;
    }
    .takeaway-block {
      border-left: 4px solid #C49A00;
      padding: var(--s1) var(--s2);     /* 8px 16px */
      background: #FFF8E8;
      border-radius: 0 6px 6px 0;
      font-size: var(--text-sm);
      line-height: var(--lh-body);
      margin-top: var(--s2);
    }
    .takeaway-block strong {
      color: #7A5C00;
    }

    /* ── Buttons ──────────────────────────────────────────────────────────── */
    .btn-primary-custom {
      background: var(--base);
      color: var(--white);
      border: none;
      padding: var(--s1) var(--s3);      /* 8px 24px */
      border-radius: 6px;
      font-weight: 600;
      font-size: var(--text-sm);
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background .15s;
      line-height: var(--lh-tight);
    }
    .btn-primary-custom:hover { background: #3a4f9a; color: var(--white); }

    .btn-secondary-custom {
      background: transparent;
      color: var(--base);
      border: 2px solid var(--base);
      padding: calc(var(--s1) - 2px) var(--s3);
      border-radius: 6px;
      font-weight: 600;
      font-size: var(--text-sm);
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background .15s, color .15s;
      line-height: var(--lh-tight);
    }
    .btn-secondary-custom:hover { background: var(--base); color: var(--white); }

    /* ── Answer options (practice / quiz) ─────────────────────────────────── */
    .answer-option {
      border: 2px solid var(--light-grey);
      border-radius: 8px;
      padding: var(--s1) var(--s2);      /* 8px 16px */
      cursor: pointer;
      transition: border-color .15s, background .15s;
      display: flex;
      align-items: center;
      gap: var(--s2);
      margin-bottom: var(--s1);
      background: var(--white);
      font-size: var(--text-base);
      line-height: var(--lh-body);
    }
    .answer-option:hover { border-color: var(--accent); background: var(--bg); }
    .answer-option input[type=radio] { accent-color: var(--base); width: 18px; height: 18px; flex-shrink: 0; }
    .answer-option.selected { border-color: var(--base); background: var(--light-grey); }
    .answer-option .opt-label {
      font-weight: 700;
      color: var(--base);
      min-width: 20px;
      font-size: var(--text-sm);
    }

    /* ── Quiz / result feedback ───────────────────────────────────────────── */
    .correct-badge { color: var(--correct); font-weight: 700; }
    .wrong-badge   { color: var(--wrong);   font-weight: 700; }

    .feedback-correct {
      border-left: 4px solid var(--correct);
      background: #EAF5EE;
      border-radius: 0 8px 8px 0;
      padding: var(--s2) var(--s3);
      margin: var(--s2) 0;
    }
    .feedback-wrong {
      border-left: 4px solid var(--wrong);
      background: #FDECEA;
      border-radius: 0 8px 8px 0;
      padding: var(--s2) var(--s3);
      margin: var(--s2) 0;
    }
    .feedback-label {
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: var(--s1);
    }
    .feedback-answer {
      font-size: var(--text-lg);
      font-weight: 800;
    }

    /* ── Results score ────────────────────────────────────────────────────── */
    .result-big {
      font-size: var(--text-xl);
      font-weight: 800;
      color: var(--base);
      line-height: var(--lh-tight);
    }

    /* ── Sidebar nav (lesson index) ───────────────────────────────────────── */
    .sidebar-panel {
      background: var(--white);
      border-radius: 10px;
      padding: var(--s2);
      box-shadow: 0 1px 6px rgba(44,62,122,.07);
      position: sticky;
      top: var(--s2);
    }
    .lesson-index { list-style: none; padding: 0; margin: 0; }
    .lesson-index li {
      position: relative;
      padding: .5rem .75rem .5rem 2.25rem;   /* top/bottom = 8px */
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: var(--text-sm);
      color: var(--muted-text);
      transition: background .15s, color .15s;
      line-height: var(--lh-body);
    }
    .lesson-index li a { text-decoration: none; color: inherit; display: block; }
    .lesson-index li::before {
      content: attr(data-step);
      position: absolute; left: .5rem; top: 50%; transform: translateY(-50%);
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--light-grey); color: var(--muted-text);
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-xs); font-weight: 700;
    }
    .lesson-index li.active { background: var(--light-grey); color: var(--base); font-weight: 600; }
    .lesson-index li.active::before { background: var(--base); color: var(--white); }
    .lesson-index li:hover:not(.active) { background: var(--bg); color: var(--dark-grey); cursor: pointer; }
    .index-divider { border: none; border-top: 1px solid var(--light-grey); margin: var(--s1) 0; }
    .lesson-index li.done { color: var(--correct); }
    .lesson-index li.done::before { background: var(--correct); color: var(--white); content: '\2713'; }
    .lesson-index li.wrong-item { color: var(--wrong); }
    .lesson-index li.wrong-item::before { background: var(--wrong); color: var(--white); content: '\2717'; }

    /* ── Footer ───────────────────────────────────────────────────────────── */
    footer {
      color: var(--muted-text);
      font-size: var(--text-xs);
      padding: var(--s4) 0 var(--s2);
      text-align: center;
    }

    /* ── Utility ──────────────────────────────────────────────────────────── */
    .mt-s1 { margin-top: var(--s1); }
    .mt-s2 { margin-top: var(--s2); }
    .mt-s3 { margin-top: var(--s3); }
    .mt-s4 { margin-top: var(--s4); }
    .mb-s1 { margin-bottom: var(--s1); }
    .mb-s2 { margin-bottom: var(--s2); }
    .progress-label { font-size: var(--text-lg); font-weight: 600; color: var(--muted-text); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav class="top-nav">
  <span class="brand">Cognitive Distortions</span>
  <a href="{{ url_for('home') }}" class="{% if request.endpoint == 'home' %}active{% endif %}">Home</a>
  <a href="{{ url_for('learn', lesson_num=1) }}" class="{% if request.endpoint in ['learn','practice','practice_reveal'] %}active{% endif %}">Learn</a>
  <a href="{{ url_for('quiz_intro') }}" class="{% if request.endpoint in ['quiz_intro','quiz','quiz_submit','quiz_incorrect'] %}active{% endif %}">Quiz</a>
  <a href="{{ url_for('results') }}" class="{% if request.endpoint == 'results' %}active{% endif %}">Results</a>
</nav>

{% if progress is defined %}
<div class="progress-bar-custom">
  <div class="fill" style="width:{{ progress }}%"></div>
</div>
{% endif %}

<div class="page-wrap">
  {% block content %}{% endblock %}
</div>

<footer>Identifying Cognitive Distortions &nbsp;·&nbsp; HW10 &nbsp;·&nbsp; Zirou Liang &amp; Silin Jiang</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
