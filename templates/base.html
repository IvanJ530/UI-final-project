<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Identifying Cognitive Distortions{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <style>
    :root {
      --primary: #2C3E7A;
      --accent: #6C8EBF;
      --light-bg: #F4F6FB;
      --card-bg: #FFFFFF;
      --correct: #2D7A4F;
      --wrong: #B03A2E;
      --text: #1a1a2e;
      --muted: #6c757d;
    }
    body { background: var(--light-bg); color: var(--text); font-family: 'Segoe UI', Calibri, sans-serif; }
    nav.top-nav {
      background: var(--primary);
      padding: 0.6rem 2rem;
      display: flex;
      align-items: center;
      gap: 0;
    }
    nav.top-nav .brand { color: #fff; font-weight: 700; font-size: 1rem; margin-right: auto; letter-spacing: .03em; }
    nav.top-nav a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.35rem 1rem;
      border-radius: 4px;
      transition: background .15s, color .15s;
    }
    nav.top-nav a:hover, nav.top-nav a.active { color: #fff; background: rgba(255,255,255,0.15); }
    .progress-bar-custom {
      height: 5px;
      background: #dce4f0;
    }
    .progress-bar-custom .fill {
      height: 100%;
      background: var(--accent);
      transition: width .4s;
    }
    .card-main {
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 2px 14px rgba(44,62,122,.09);
      padding: 2.5rem;
    }
    .label-pill {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: .25rem .75rem;
      border-radius: 20px;
      margin-bottom: 1rem;
    }
    .section-heading {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .35rem;
    }
    .thought-bubble {
      background: #EEF2FA;
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      font-style: italic;
      color: var(--text);
      margin: 1.2rem 0;
    }
    .btn-primary-custom {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: .6rem 1.6rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: .9rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background .15s;
    }
    .btn-primary-custom:hover { background: #3a4f9a; color: #fff; }
    .btn-secondary-custom {
      background: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
      padding: .55rem 1.4rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: .9rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background .15s;
    }
    .btn-secondary-custom:hover { background: var(--primary); color: #fff; }
    .answer-option {
      border: 2px solid #dce4f0;
      border-radius: 8px;
      padding: .75rem 1.2rem;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: .7rem;
      background: #fff;
    }
    .answer-option:hover { border-color: var(--accent); background: #f0f4fb; }
    .answer-option input[type=radio] { accent-color: var(--primary); width: 18px; height: 18px; }
    .answer-option.selected { border-color: var(--primary); background: #eef2fa; }
    .correct-badge { color: var(--correct); font-weight: 700; }
    .wrong-badge { color: var(--wrong); font-weight: 700; }
    .result-big { font-size: 3.5rem; font-weight: 800; color: var(--primary); }
    footer { color: var(--muted); font-size: .8rem; padding: 2rem 0 1rem; text-align: center; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav class="top-nav">
  <span class="brand">Cognitive Distortions</span>
  <a href="{{ url_for('home') }}" class="{% if request.endpoint == 'home' %}active{% endif %}">Home</a>
  <a href="{{ url_for('learn', lesson_num=1) }}" class="{% if request.endpoint in ['learn','practice','practice_reveal'] %}active{% endif %}">Learn</a>
  <a href="{{ url_for('quiz_intro') }}" class="{% if request.endpoint in ['quiz_intro','quiz','quiz_submit','quiz_incorrect'] %}active{% endif %}">Quiz</a>
  <a href="{{ url_for('results') }}" class="{% if request.endpoint == 'results' %}active{% endif %}">Results</a>
</nav>

{% if progress is defined %}
<div class="progress-bar-custom">
  <div class="fill" style="width:{{ progress }}%"></div>
</div>
{% endif %}

<div class="container py-4" style="max-width:760px;">
  {% block content %}{% endblock %}
</div>

<footer>Identifying Cognitive Distortions &nbsp;·&nbsp; HW10 &nbsp;·&nbsp; Zirou Liang &amp; Silin Jiang</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
